server:
  port: 8080

bpmnflow:
  model-path: classpath:process.bpmn
  config-path: classpath:bpmn-config.yaml
  expose-api: true   # Enables GET /bpmnflow/** inspection endpoints

spring:
  application:
    name: bpmnflow-demo
  jackson:
    default-property-inclusion: non_null
    serialization:
      indent-output: true
